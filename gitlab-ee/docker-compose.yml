#version: '3.8'
services:
  gitlab:
    image: 'gitlab/gitlab-ee:latest'
    container_name: gitlab
    hostname: 'gitlab.userv.ru'
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'https://gitlab.userv.ru'
        gitlab_rails['gitlab_shell_ssh_port'] = 2222
    ports:
      - '6080:80'
      - '6443:443'
      - '2222:22'
    volumes:
      - './config:/etc/gitlab'
      - './logs:/var/log/gitlab'
      - './data:/var/opt/gitlab'
    restart: always
